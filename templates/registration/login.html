<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión — CRM GAVI PERU</title>
</head>
<body>
  <h1>CRM GAVI PERU</h1>
  {% if form.errors %}
    <p>Usuario o contraseña incorrectos.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    {{ next }}
    {{ form.as_p }}
    <button type="submit">Ingresar</button>
  </form>
</body>
</html>
